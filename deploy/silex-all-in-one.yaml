apiVersion: v1
kind: Namespace
metadata:
  name: silex-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: silex-operator-sa
  namespace: silex-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: silex-operator-role
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: silex-operator-binding
subjects:
  - kind: ServiceAccount
    name: silex-operator-sa
    namespace: silex-system
roleRef:
  kind: ClusterRole
  name: silex-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silex-ingress
  namespace: silex-system
  labels:
    app: silex-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silex-ingress
  template:
    metadata:
      labels:
        app: silex-ingress
    spec:
      hostNetwork: true
      containers:
        - name: ingress
          image: abdueissa/silex-ingress:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              hostPort: 80
            - containerPort: 9090
              hostPort: 9090
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
---
apiVersion: v1
kind: Service
metadata:
  name: silex-ingress-service
  namespace: silex-system
spec:
  selector:
    app: silex-ingress
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: api
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silex-operator
  namespace: silex-system
  labels:
    app: silex-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silex-operator
  template:
    metadata:
      labels:
        app: silex-operator
    spec:
      serviceAccountName: silex-operator-sa
      containers:
        - name: operator
          image: abdueissa/silex-operator:v1.0.0
          imagePullPolicy: IfNotPresent